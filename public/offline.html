<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Dreamland College</title>
  <meta name="theme-color" content="#059669">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #f5f5f4 0%, #e8e8e3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
      background: white;
      padding: 48px;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }
    
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1c1917;
      margin-bottom: 12px;
    }
    
    p {
      color: #78716c;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: #fef3c7;
      color: #92400e;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    
    .status.reconnected {
      background: #d1fae5;
      color: #065f46;
    }
    
    .pulse {
      width: 8px;
      height: 8px;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    button {
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(5, 150, 105, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(5, 150, 105, 0.4);
    }
    
    .btn-secondary {
      background: #f5f5f4;
      color: #44403c;
    }
    
    .btn-secondary:hover {
      background: #e8e8e3;
    }
    
    .cached-pages {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #e8e8e3;
      text-align: left;
    }
    
    .cached-pages h3 {
      font-size: 14px;
      font-weight: 700;
      color: #78716c;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    
    .cached-pages ul {
      list-style: none;
      font-size: 14px;
      color: #44403c;
    }
    
    .cached-pages li {
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .cached-pages li::before {
      content: '✓';
      color: #059669;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    
    <div class="status" id="status">
      <span class="pulse"></span>
      <span>No internet connection</span>
    </div>
    
    <p>
      Don't worry! You can still access some cached pages and features. 
      Any changes you make will be saved and synced when you're back online.
    </p>
    
    <div class="actions">
      <button class="btn-primary" onclick="window.location.reload()">
        🔄 Try Again
      </button>
      <button class="btn-secondary" onclick="window.history.back()">
        ← Go Back
      </button>
    </div>
    
    <div class="cached-pages">
      <h3>Available Offline</h3>
      <ul>
        <li>Dashboard (cached view)</li>
        <li>Student profiles</li>
        <li>Course materials</li>
        <li>Previously loaded pages</li>
      </ul>
    </div>
  </div>

  <script>
    // Check connection status
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.className = 'status reconnected';
        statusEl.innerHTML = '<span class="pulse"></span><span>Reconnected! Syncing...</span>';
        
        // Reload after a short delay
        setTimeout(() => {
          window.location.reload();
        }, 1500);
      }
    }

    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    // Initial check
    updateStatus();

    // Register service worker if not already registered
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then((registration) => {
          console.log('ServiceWorker registered:', registration.scope);
        })
        .catch((error) => {
          console.log('ServiceWorker registration failed:', error);
        });
    }
  </script>
</body>
</html>
